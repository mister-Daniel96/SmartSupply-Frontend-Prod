<div class="min-h-screen bg-slate-100 flex">
    <aside class="fixed inset-y-0 left-0 z-50 w-72 bg-[#0f2b57] text-white shadow-2xl transition-transform duration-300"
        [ngClass]="{
      'translate-x-0': menuOpen || !isMobile,
      '-translate-x-full': !menuOpen && isMobile
    }">
        <div class="flex h-full flex-col">
            <div class="border-b border-white/10 px-6 py-6">
                <div class="flex items-center gap-3">
                    <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-white/10 text-white">
                        <i class="fa-solid fa-chart-line text-lg"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-semibold tracking-wide text-white">SmartSupply</h2>
                        <p class="text-sm text-[#8b95a7]">Panel del cliente</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 py-6">
                <p class="px-3 pb-3 text-xs font-medium uppercase tracking-[0.2em] text-[#8b95a7]">
                    Navegación
                </p>

                <div class="space-y-2">
                    @for (boton of botones; track boton.ruta) {
                    <a [routerLink]="['/cliente', boton.ruta]" (click)="closeMenuOnMobile()"
                        class="group flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-[#8b95a7] transition-all duration-200 hover:bg-white/5 hover:text-white"
                        [ngClass]="{
                'bg-white/10 text-white': isLinkActive(boton.ruta)
              }">
                        <span class="flex h-10 w-10 items-center justify-center rounded-xl transition" [ngClass]="
                  isLinkActive(boton.ruta)
                    ? 'text-white'
                    : 'text-[#8b95a7] group-hover:text-white'
                ">
                            <i [ngClass]="[boton.icon, 'text-base']"></i>
                        </span>

                        <span>{{ boton.texto }}</span>
                    </a>
                    }
                </div>
            </nav>

            <div class="mt-auto px-4 pb-6">
                <button type="button" (click)="cerrar()"
                    class="group flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-[#8b95a7] transition-all duration-200 hover:bg-white/5 hover:text-white">
                    <span
                        class="flex h-10 w-10 items-center justify-center rounded-xl transition text-[#8b95a7] group-hover:text-white">
                        <i class="fa-solid fa-right-from-bracket text-base"></i>
                    </span>
                    <span>Cerrar sesión</span>
                </button>
            </div>
        </div>
    </aside>

    <div class="flex-1 lg:ml-72">
        <header
            class="sticky top-0 z-40 flex h-16 items-center justify-between border-b border-slate-200 bg-white/80 px-4 backdrop-blur lg:hidden">
            <button type="button"
                class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 text-slate-700"
                (click)="toggleSidenav()">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="text-sm font-semibold text-slate-700">SmartSupply</div>
            <div class="w-10"></div>
        </header>

        <main class="p-4 md:p-6">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
