            <div class="profile__info">
              <h2 class="profile__name">
                {{ form.value.nameUsuario || 'Usuario' }}
              </h2>
              <p class="profile__email">
                {{ form.value.emailUsuario || 'Correo' }}
              </p>
            </div>
          </div>

          <form [formGroup]="form">
            <div class="section">
              <h3 class="section__title">Información personal</h3>
              <div class="form-grid">
                <div class="form-field">
                  <label for="nombre">Nombre</label>
                  <input id="nombre" type="text" class="input" [value]="form.value.nameUsuario" readonly />
                </div>
                <div class="form-field">
                  <label for="rol">Rol</label>
                  <input id="rol" type="text" class="input" [value]="form.value.rolUsuario" readonly />
                </div>
                <div class="form-field">
                  <label for="email">Correo electrónico</label>
                  <input id="email" type="email" class="input" [value]="form.value.emailUsuario" readonly />
                </div>
                <div class="form-field">
                  <label for="telefono">Número de teléfono</label>
                  <input id="telefono" type="tel" class="input" [value]="form.value.phoneUsuario" readonly />
                </div>
              </div>
            </div>

            <hr class="divider" />

            <div class="section">
              <h3 class="section__title">Seguridad de la cuenta</h3>
              <div class="security-item">
                <div class="form-field_password">
                  <h4 class="security-item__title">Contraseña</h4>
                  <input formControlName="passwordUsuario" type="password" class="input input--ghost input_password"
                    [value]="form.value.passwordUsuario" [disabled]="flagPassword" />
                </div>
                <button class="link-button" type="button" (click)="changeFlagPassword()">
                  Cambiar contraseña
                </button>
              </div>
            </div>

            <div class="actions">

              <button type="submit" class="btn btn--primary btn_guardar_cambios" [disabled]="flagPassword"
                (click)="aceptar()">
                Guardar cambios
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
