<div class="min-h-screen bg-white flex items-center justify-center px-4">
    <div class="w-full max-w-7xl mx-auto">
        <header class="absolute top-0 left-0 p-8">
            <div class="flex items-center gap-3">
                <svg class="h-12 w-12" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00A859" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"></path>
                    <path d="M2 17L12 22L22 17" stroke="#00A859" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"></path>
                    <path d="M2 12L12 17L22 12" stroke="#00A859" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"></path>
                </svg>

                <div>
                    <h1 class="text-2xl font-bold text-green-600">Dinet</h1>
                    <p class="text-sm text-gray-500">logística inteligente</p>
                </div>
            </div>
        </header>

        <main class="grid md:grid-cols-2 gap-12 items-center min-h-screen">
            <div class="bg-white p-10 rounded-2xl shadow-lg text-center border border-gray-100">
                <h2 class="text-4xl font-bold mb-6 text-gray-900">BIENVENIDO</h2>
                <p class="text-2xl mb-6 text-gray-700">
                    Administra la demanda de los artículos
                </p>
                <p class="text-gray-500">
                    Recuerde que el ingreso es con su usuario institucional
                </p>
            </div>

            <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                <h3 class="text-2xl font-bold text-center mb-8 text-gray-900">
                    INICIAR SESIÓN
                </h3>

                <form [formGroup]="form" class="space-y-5" (ngSubmit)="login()">
                    <div>
                        <label for="nameUsuario" class="block text-sm font-medium text-gray-700 mb-2">
                            Username
                        </label>
                        <input id="nameUsuario" type="text" formControlName="nameUsuario" placeholder="Username"
                            class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500" />
                    </div>

                    <div>
                        <label for="passwordUsuario" class="block text-sm font-medium text-gray-700 mb-2">
                            Password
                        </label>

                        <div class="relative">
                            <input id="passwordUsuario" formControlName="passwordUsuario"
                                [type]="hide ? 'password' : 'text'" placeholder="Password"
                                class="w-full rounded-lg border border-gray-300 px-4 py-3 pr-12 outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500" />

                            <button type="button" (click)="hide = !hide"
                                class="absolute inset-y-0 right-0 flex items-center px-4 text-sm text-gray-500 hover:text-gray-700"
                                [attr.aria-label]="hide ? 'Mostrar contraseña' : 'Ocultar contraseña'"
                                [attr.aria-pressed]="!hide">
                                {{ hide ? 'Ver' : 'Ocultar' }}
                            </button>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full rounded-lg bg-green-600 px-4 py-3 font-semibold text-white transition hover:bg-green-700">
                        Ingresar
                    </button>

                    @if (mensaje) {
                    <p class="text-sm text-red-600 text-center">
                        {{ mensaje }}
                    </p>
                    }
                </form>
            </div>
        </main>
    </div>
</div>
